# Publish the Auria container image to GitHub Container Registry (GHCR) on version tags.
#
#   git tag v0.1.0 && git push origin v0.1.0    # -> ghcr.io/<owner>/auria:0.1.0 + :latest
#
# Then run it anywhere:  docker pull ghcr.io/<owner>/auria:latest
# See docs/guides/deployment.md. The image is private by default — make the package
# public in the repo's Packages settings if you want unauthenticated pulls.
name: Publish image

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # allow a manual publish of the current default branch

permissions:
  contents: read
  packages: write # required to push to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
