# Publish the Auria container image to GitHub Container Registry (GHCR) on version tags.
#
#   git tag v0.1.0 && git push origin v0.1.0    # -> ghcr.io/<owner>/auria:0.1.0 + :latest
#
# Then run it anywhere:  docker pull ghcr.io/<owner>/auria:latest
# See docs/guides/deployment.md. The image is private by default — make the package
# public in the repo's Packages settings if you want unauthenticated pulls.
name: Publish image

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # allow a manual publish of the current default branch

permissions:
  contents: read
  packages: write # required to push to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Third-party actions pinned to immutable commit SHAs (supply-chain hardening —
      # this job has packages:write + the GITHUB_TOKEN). SHAs resolved from the official
      # docker/* repos; bump deliberately when upgrading.
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.9.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.9.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
